<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Shem 的單頁瀏覽器遊戲收藏。">
  <title>Shem's Single-Page Games</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #171325;
      --panel: #241d39;
      --panel-2: #33294d;
      --ink: #fff9df;
      --muted: #c8bedc;
      --accent: #ff82b5;
      --accent-2: #ffe16b;
      --border: #67577d;
    }

    * { box-sizing: border-box; }

    html { min-height: 100%; }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, rgba(121, 216, 255, .15), transparent 32rem),
        radial-gradient(circle at 85% 5%, rgba(255, 130, 181, .13), transparent 30rem),
        var(--bg);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    a { color: inherit; }

    .shell {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 64px 0 80px;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent-2);
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .15em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 820px;
      margin: 0;
      font-size: clamp(2.2rem, 7vw, 5.6rem);
      line-height: .92;
      letter-spacing: -.07em;
    }

    .intro {
      max-width: 680px;
      margin: 24px 0 46px;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.16rem);
      line-height: 1.75;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 320px), 1fr));
      gap: 24px;
    }

    .card {
      overflow: hidden;
      border: 2px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(145deg, var(--panel-2), var(--panel));
      box-shadow: 8px 8px 0 rgba(0, 0, 0, .24);
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
    }

    .card:hover,
    .card:focus-within {
      transform: translate(-3px, -3px);
      border-color: var(--accent);
      box-shadow: 11px 11px 0 rgba(0, 0, 0, .28);
    }

    .preview {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      image-rendering: pixelated;
      border-bottom: 2px solid var(--border);
      background: #79d8ff;
    }

    .body { padding: 22px; }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .tag {
      padding: 6px 9px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-size: .72rem;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 1.6rem;
      letter-spacing: -.04em;
    }

    .description {
      min-height: 3.2em;
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.6;
    }

    .play {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 44px;
      padding: 0 16px;
      border: 2px solid #3c2943;
      border-radius: 10px;
      color: #342038;
      background: var(--accent);
      font-weight: 900;
      text-decoration: none;
      box-shadow: 4px 4px 0 #3c2943;
    }

    .play:hover { filter: brightness(1.06); }
    .play:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #3c2943; }
    .play:focus-visible { outline: 3px solid var(--accent-2); outline-offset: 4px; }

    footer {
      margin-top: 56px;
      color: var(--muted);
      font-size: .82rem;
    }

    @media (max-width: 560px) {
      .shell { width: min(100% - 22px, 1080px); padding-top: 38px; }
      .intro { margin-bottom: 32px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .card { transition: none; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <p class="eyebrow">Tiny games · One browser tab</p>
    <h1>Single-Page Games</h1>
    <p class="intro">一個 repo，收納可以直接在瀏覽器玩的迷你遊戲。每款遊戲都使用獨立子目錄，不需要框架或後端。</p>

    <section class="grid" aria-label="遊戲列表">
      <article class="card">
        <img class="preview" src="./assets/previews/mochi-sky.png" alt="麻糬星野遊戲畫面，粉紅色圓滾滾角色站在像素草地上">
        <div class="body">
          <div class="meta" aria-label="遊戲標籤">
            <span class="tag">Pixel art</span>
            <span class="tag">Side scroller</span>
            <span class="tag">POC</span>
          </div>
          <h2>麻糬星野</h2>
          <p class="description">粉彩像素風橫向卷軸小遊戲。跳躍、吸入敵人、發射星彈，走到關卡終點。</p>
          <a class="play" href="./games/mochi-sky/" aria-label="開始玩麻糬星野">▶ 開始遊戲</a>
        </div>
      </article>
    </section>

    <footer>Built as static HTML · Hosted with GitHub Pages</footer>
  </main>
</body>
</html>
